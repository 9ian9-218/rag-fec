[loggers]
keys=root,graph_rag

[handlers]
keys=console

[formatters]
keys=std

[logger_root]
level=INFO
handlers=console

[logger_graph_rag]
level=INFO
handlers=console
qualname=graph_rag_project
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=std
args=(sys.stdout,)

[formatter_std]
format=%(asctime)s | %(levelname)s | %(name)s | %(message)s
datefmt=%Y-%m-%d %H:%M:%S
